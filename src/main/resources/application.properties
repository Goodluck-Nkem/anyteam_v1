spring.application.name=anyteam_v1

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

spring.jackson.serialization.indent-output=true

# choose use_postgres for the default profile
spring.profiles.active=use_postgres

# set pageable default and max
spring.data.web.pageable.default-page-size=10
spring.data.web.pageable.max-page-size=200

# Generate schema file
spring.jpa.properties.hibernate.hbm2ddl.schema-generation.scripts.action=create
spring.jpa.properties.hibernate.hbm2ddl.schema-generation.scripts.create-target=schema.sql

