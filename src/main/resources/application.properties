spring.application.name=anyteam_v1

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

spring.jackson.serialization.indent-output=true

# choose use_postgres for the default profile
spring.profiles.active=use_postgres

# set pageable default and max
spring.data.web.pageable.default-page-size=10
spring.data.web.pageable.max-page-size=200

# batch operation settings for persistence
spring.jpa.properties.hibernate.jdbc.batch_size=50
spring.jpa.properties.hibernate.order_inserts=true
spring.jpa.properties.hibernate.order_updates=true
spring.jpa.properties.hibernate.id.optimizer.pooled.preferred=pooled-lo
spring.jpa.properties.hibernate.id.new_generator_mappings=true

# show batch logs (didn't still show)
spring.jpa.properties.hibernate.generate_statistics=true
logging.level.org.hibernate.stat=DEBUG
logging.level.org.hibernate.engine.jdbc.batch.internal=DEBUG
logging.level.org.hibernate.orm.jdbc.batch=DEBUG

